<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Booking VAT System</title>

<style>
body { margin:0; font-family:Arial; display:flex; background:#f2f5f9; }

/* LOGIN */
#loginPage { width:350px; margin:80px auto; }
.login-box { background:white; border-radius:12px; text-align:center; overflow:hidden; }

.login-header {
  background:#003580;
  padding:25px;
  color:white;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  background:#003580;
  color:white;
  height:100vh;
  padding:20px;
  display:none;
}

.sidebar select, .sidebar button {
  width:100%;
  margin:5px 0;
  padding:10px;
}

/* MAIN */
.main {
  flex:1;
  padding:20px;
  display:none;
  position:relative;
}

/* BUTTON */
.top-button {
  position:absolute;
  right:20px;
  top:20px;
  background:#0071c2;
  color:white;
  padding:8px 12px;
  border-radius:6px;
  text-decoration:none;
  font-size:12px;
}

/* ✅ HEADER FIX */
.company {
  font-size:24px;       /* ✅ BIGGER */
  font-weight:bold;
  margin-bottom:10px;   /* ✅ SPACING */
}

.dashboard-title {
  font-size:18px;
  margin-bottom:20px;   /* ✅ SPACING */
}

/* CARDS */
.cards {
  display:flex;
  gap:10px;
  margin:10px 0;
}

.card {
  flex:1;
  background:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

/* ✅ UNPAID RED */
.red {
  color:red;
  font-weight:bold;
}

/* TABLE */
table { width:100%; background:white; border-collapse:collapse; }
th { background:#003580; color:white; padding:10px; }
td { padding:8px; text-align:center; border-bottom:1px solid #eee; }

/* STATUS */
.paid { color:green; }
.unpaid { color:red; }

/* POPUP */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
}

.modal-box {
  background:white;
  padding:25px;
  width:400px;
  margin:10% auto;
  text-align:center;
}

.paid-highlight {
  color:green;
  font-size:18px;
  margin:20px 0;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<div class="login-box">

<div class="login-header">
<h1>Booking.com</h1>
<div style="font-size:12px;">VAT SYSTEM</div>
</div>

<div style="font-size:12px; margin:10px;">
Log in to Booking.com B.V. VAT System to proceed
</div>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>

</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

<h2>Booking.com</h2>

<select onchange="load(this.value)">
<option value="2026">2026</option>
<option value="2025">2025</option>
</select>

<button onclick="filterQuarter('all')">All</button>
<button onclick="filterQuarter('Q1')">Q1</button>
<button onclick="filterQuarter('Q2')">Q2</button>

</div>

<!-- MAIN -->
<div class="main" id="main">

<a class="top-button"
href="https://admin.booking.com/hotel/hoteladmin/extranet_ng/manage/finance_invoices.html?hotel_id=10810275"
target="_blank">
← Go back to main page
</a>

<div class="company">Bellagio Hills Hotel & Restaurant</div>
<div class="dashboard-title">VAT Dashboard</div>

<div class="cards">
<div class="card">Total VAT<br><b id="tot"></b></div>
<div class="card">Paid<br><b id="paid"></b></div>
<div class="card">Unpaid<br><b id="unpaid" class="red"></b></div>
</div>

<table id="vatTable">
<thead>
<tr>
<th>Month</th>
<th>Commission</th>
<th>VAT</th>
<th>Status</th>
<th>Quarter</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<!-- POPUP -->
<div id="modal" class="modal">
<div class="modal-box">
<h3>VAT Details</h3>

<p id="mMonth"></p>
<p id="mCommission"></p>
<p id="mVAT"></p>

<div class="paid-highlight">✔ PAID</div>

<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

function peso(n){
return "₱ "+Number(n).toLocaleString("en-PH",{minimumFractionDigits:2});
}

// DATA
const data2026=[
["January",4284,514,"Paid","Q1"],
["February",9240,1108,"Paid","Q1"],
["March",2396,287,"Paid","Q1"],
["April",756,90,"Paid","Q2"],
["May",10701,1284,"Unpaid","Q2"]
];

const data2025={
January:2511, February:14094, March:3987, April:4770.9,
May:5859, June:753.3, September:837,
October:4185, November:1674, December:3180.6
};

const months=["January","February","March","April","May","June","July","August","September","October","November","December"];

// LOGIN
function login(){
if(user.value==="sales@bellagiohills.com.ph" &&
pass.value==="GMBellagiohills#2025"){
loginPage.style.display="none";
sidebar.style.display="block";
main.style.display="block";
load("2026");
}
}

// LOAD
function load(year){

let tb=vatTable.querySelector("tbody");
tb.innerHTML="";

let total=0, paidCount=0, unpaidCount=0;

if(year==="2026"){

data2026.forEach(r=>{
total+=r[2];
(r[3]=="Paid")?paidCount++:unpaidCount++;

tb.innerHTML+=rowHTML(r);
});

["June","July","August","September","October","November","December"].forEach(m=>{
tb.innerHTML+=`<tr><td>${m}</td><td colspan="5">Unavailable</td></tr>`;
});

}

if(year==="2025"){

months.forEach(m=>{
let c=data2025[m]||0;
let v=c*0.12;

if(c>0){
unpaidCount++;
total+=v;
}

tb.innerHTML+=rowHTML([m,c,v,"Unpaid","-"]);
});

}

tot.innerText=peso(total);
paid.innerText=paidCount;
unpaid.innerText=unpaidCount;

}

// ROW
function rowHTML(r){
return `<tr data-q="${r[4]}">
<td>${r[0]}</td>
<td>${peso(r[1])}</td>
<td>${peso(r[2])}</td>
<td class="${r[3]=='Paid'?'paid':'unpaid'}">${r[3]}</td>
<td>${r[4]}</td>
<td>${r[3]=='Paid'?'<button onclick="openModal(this)">View</button>':'Unsubmitted'}</td>
</tr>`;
}

// FILTER
function filterQuarter(q){
document.querySelectorAll("#vatTable tbody tr").forEach(r=>{
if(!r.dataset.q || r.dataset.q=="-"){ r.style.display=""; return;}
r.style.display=(q==="all"||r.dataset.q===q)?"":"none";
});
}

// ✅ POPUP FIXED
function openModal(btn){
let r=btn.parentElement.parentElement;
mMonth.innerText="Month: "+r.children[0].innerText;
mCommission.innerText="Commission: "+r.children[1].innerText;
mVAT.innerText="VAT: "+r.children[2].innerText;
modal.style.display="block";
}

function closeModal(){ modal.style.display="none"; }

</script>

</body>
</html>
``
