<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Booking VAT Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

/* GLOBAL */
body {
  margin: 0;
  font-family: Arial;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: #003580;
  color: white;
  height: 100vh;
  padding: 20px;
}

.sidebar h2 {
  margin-bottom: 20px;
}

.sidebar button {
  width: 100%;
  margin: 5px 0;
  padding: 10px;
  background: #0071c2;
  border: none;
  color: white;
  border-radius: 6px;
}

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.cards {
  display: flex;
  gap: 10px;
  margin: 15px 0;
}

.card {
  flex: 1;
  background: #fff;
  padding: 15px;
  border-radius: 10px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th {
  background: #003580;
  color: white;
  padding: 10px;
}

td {
  padding: 8px;
  text-align: center;
}

.paid { color: green; font-weight: bold; }
.unpaid { color: red; font-weight: bold; }

</style>
</head>

<body>

<div class="sidebar">
  <h2>Dashboard</h2>
  <button onclick="filterQuarter('all')">All</button>
  <button onclick="filterQuarter('Q1')">Q1</button>
  <button onclick="filterQuarter('Q2')">Q2</button>
  <button onclick="exportExcel()">Export Excel</button>
</div>

<div class="main">

<div class="topbar">
  <h2>Bellagio Hills Hotel and Restaurant</h2>
  <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Booking.com_Logo_blue.svg" width="150">
</div>

<h3>Booking.com VAT Report 2026</h3>

<div class="cards">
  <div class="card">Total VAT: <b id="totalVAT"></b></div>
  <div class="card">Paid: <b id="paidCount"></b></div>
  <div class="card">Unpaid: <b id="unpaidCount"></b></div>
</div>

<canvas id="chart" height="100"></canvas>

<br>

<table id="vatTable">
<thead>
<tr>
<th>Month</th>
<th>Commission</th>
<th>VAT</th>
<th>Status</th>
<th>Remittance</th>
<th>Quarter</th>
<th>PDF</th>
</tr>
</thead>

<tbody>
<tr data-q="Q1"><td>Jan</td><td>4284</td><td>514.08</td><td class="paid">Paid</td><td>Feb-26</td><td>Q1</td><td><button onclick="pdf(this)">PDF</button></td></tr>
<tr data-q="Q1"><td>Feb</td><td>9240</td><td>1108.80</td><td class="paid">Paid</td><td>Mar-26</td><td>Q1</td><td><button onclick="pdf(this)">PDF</button></td></tr>
<tr data-q="Q1"><td>Mar</td><td>2396.85</td><td>287.62</td><td class="paid">Paid</td><td>Apr-26</td><td>Q1</td><td><button onclick="pdf(this)">PDF</button></td></tr>
<tr data-q="Q2"><td>Apr</td><td>756</td><td>90.72</td><td class="paid">Paid</td><td>May-26</td><td>Q2</td><td><button onclick="pdf(this)">PDF</button></td></tr>
<tr data-q="Q2"><td>May</td><td>10701</td><td>1284.12</td><td class="unpaid">Unpaid</td><td>Jun-26</td><td>Q2</td><td>-</td></tr>
</tbody>
</table>

</div>

<script>

// ✅ CALCULATIONS
function calc() {
  let total=0, paid=0, unpaid=0;

  document.querySelectorAll("#vatTable tbody tr").forEach(r=>{
    let v=parseFloat(r.children[2].innerText)||0;
    total+=v;
    if(r.children[3].innerText.includes("Paid")) paid++;
    else unpaid++;
  });

  totalVAT.innerText="₱ "+total.toFixed(2);
  paidCount.innerText=paid;
  unpaidCount.innerText=unpaid;
}
calc();

// ✅ FILTER
function filterQuarter(q){
  document.querySelectorAll("#vatTable tbody tr").forEach(r=>{
    if(q==="all") r.style.display="";
    else r.style.display = r.dataset.q===q ? "" : "none";
  });
}

// ✅ CHART
new Chart(document.getElementById("chart"), {
  type: 'bar',
  data: {
    labels: ["Jan","Feb","Mar","Apr","May"],
    datasets: [{
      label: "VAT",
      data: [514.08,1108.80,287.62,90.72,1284.12],
      backgroundColor: '#0071c2'
    }]
  }
});

// ✅ EXPORT EXCEL
function exportExcel(){
  let csv="Month,Commission,VAT,Status\n";
  document.querySelectorAll("#vatTable tbody tr").forEach(r=>{
    csv+=Array.from(r.children).slice(0,4).map(td=>td.innerText).join(",")+"\n";
  });

  let blob = new Blob([csv]);
  let link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "vat.csv";
  link.click();
}

// ✅ PDF (Booking style)
function pdf(btn){
  let r = btn.parentElement.parentElement;
  let {jsPDF} = window.jspdf;
  let doc = new jsPDF();

  doc.setTextColor(0,53,128);
  doc.setFontSize(18);
  doc.text("Booking.com",20,20);

  doc.setTextColor(0,0,0);
  doc.text("VAT Invoice",20,30);

  let y=50;
  for(let i=0;i<6;i++){
    doc.text(r.children[i].innerText,20,y);
    y+=10;
  }

  doc.text("Reference: BIR 2550M",20, y+10);

  doc.save("invoice.pdf");
}

</script>

</body>
</html>
``
