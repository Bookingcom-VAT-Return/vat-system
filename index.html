<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Booking VAT Dashboard</title>

<style>

/* ✅ GLOBAL */
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f6f9;
}

/* ✅ LOGIN */
#loginPage {
  max-width: 400px;
  margin: 80px auto;
}

.login-header {
  background: #003580;
  color: white;
  text-align: center;
  padding: 25px;
  border-radius: 15px 15px 0 0;
}

.logo {
  width: 150px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 0 0 15px 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 10px;
  background: #0071c2;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #005999;
}

/* ✅ DASHBOARD */
#dashboard {
  display: none;
  padding: 15px;
}

/* TOP BAR */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #fff;
  padding: 15px;
  border-radius: 12px;
}

.owner {
  font-weight: bold;
}

/* TITLE */
.title {
  text-align: center;
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-top: 10px;
}

/* TABLE */
.table-box {
  background: white;
  margin-top: 15px;
  border-radius: 12px;
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #003580;
  color: white;
  padding: 10px;
}

td {
  text-align: center;
  padding: 8px;
  border-bottom: 1px solid #eee;
}

.paid { color: green; font-weight: bold; }
.unpaid { color: red; font-weight: bold; }

/* ✅ MOBILE */
@media (max-width: 600px) {
  th, td {
    font-size: 12px;
  }
}

</style>
</head>

<body>

<!-- ✅ LOGIN -->
<div id="loginPage">
  <div class="login-header">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Booking.com_Logo_blue.svg" class="logo">
    <h2>Booking.com B.V. VAT Return</h2>
  </div>

  <div class="card">
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- ✅ DASHBOARD -->
<div id="dashboard">
  <div class="top-bar">
    <div class="owner">Bellagio Hills Hotel and Restaurant</div>
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Booking.com_Logo_blue.svg" width="120">
  </div>

  <div class="title">
    <h2>Booking.com B.V. VAT Report</h2>
    <p>Year 2026</p>
  </div>

  <div class="table-box">
    <table id="vatTable">
      <thead>
        <tr>
          <th>Month</th><th>Commission</th><th>VAT</th><th>Status</th><th>PDF</th>
        </tr>
      </thead>

      <tbody>
        <tr><td>Jan</td><td>4,284</td><td>514.08</td><td class="paid">Paid</td><td><button onclick="generatePDF(this)">PDF</button></td></tr>
        <tr><td>Feb</td><td>9,240</td><td>1,108.80</td><td class="paid">Paid</td><td><button onclick="generatePDF(this)">PDF</button></td></tr>
        <tr><td>Mar</td><td>2,396.85</td><td>287.62</td><td class="paid">Paid</td><td><button onclick="generatePDF(this)">PDF</button></td></tr>
        <tr><td>Apr</td><td>756</td><td>90.72</td><td class="paid">Paid</td><td><button onclick="generatePDF(this)">PDF</button></td></tr>
        <tr><td>May</td><td>10,701</td><td>1,284.12</td><td class="unpaid">Unpaid</td><td>-</td></tr>
      </tbody>
    </table>
  </div>

  <h3 id="totalVAT"></h3>
</div>

<!-- ✅ JS PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

// ✅ SIMPLE LOGIN STORAGE
if(localStorage.getItem("loggedIn") === "true"){
  loginPage.style.display = "none";
  dashboard.style.display = "block";
}

// LOGIN
function login(){
  if(username.value==="admin" && password.value==="1234"){
    localStorage.setItem("loggedIn", "true");
    location.reload();
  } else {
    alert("Wrong credentials");
  }
}

// TOTAL VAT
function calculateTotal(){
  let total=0;
  document.querySelectorAll("#vatTable tbody tr").forEach(r=>{
    total += parseFloat(r.children[2].innerText) || 0;
  });
  totalVAT.innerText="Total VAT: ₱ "+total.toFixed(2);
}
calculateTotal();

// PDF
function generatePDF(btn){
  let row = btn.parentElement.parentElement;

  let {jsPDF} = window.jspdf;
  let doc = new jsPDF();

  doc.setTextColor(0,53,128);
  doc.setFontSize(18);
  doc.text("Booking.com",20,20);

  doc.setTextColor(0,0,0);
  doc.setFontSize(11);

  let y=40;

  for(let i=0;i<4;i++){
    doc.text(row.children[i].innerText, 20, y);
    y+=10;
  }

  doc.save("invoice.pdf");
}

</script>

</body>
</html>
