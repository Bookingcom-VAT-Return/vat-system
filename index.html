<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Booking VAT Enterprise</title>

<style>
body { margin:0; font-family:Arial; display:flex; background:#f2f5f9; }

/* LOGIN */
#loginPage { width:350px; margin:100px auto; }
.login-box { background:white; border-radius:10px; text-align:center; }
.login-header { background:#003580; color:white; padding:20px; }

input { width:80%; padding:10px; margin:10px; }

button {
  padding:10px;
  background:#0071c2;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  background:#003580;
  color:white;
  height:100vh;
  padding:20px;
  display:none;
}

.sidebar select, .sidebar button {
  width:100%;
  margin:5px 0;
  padding:10px;
}

.address {
  margin-top:40px;
  font-size:11px;
  line-height:1.5;
}

.address a { color:white; }

/* MAIN */
.main { flex:1; padding:20px; display:none; }

/* TOP RIGHT BUTTON */
.top-button {
  position:absolute;
  right:20px;
  top:20px;
  background:#0071c2;
  color:white;
  padding:8px 12px;
  border-radius:6px;
  text-decoration:none;
  font-size:12px;
}

/* TABLE */
table { width:100%; background:white; border-collapse:collapse; }
th { background:#003580; color:white; padding:10px; }
td { padding:8px; text-align:center; border-bottom:1px solid #eee; }

/* STATUS */
.status { padding:5px 10px; border-radius:20px; }
.paid { background:#e6f7ec; color:green; }
