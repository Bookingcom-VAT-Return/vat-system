<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Booking VAT System</title>

<style>
body { margin:0; font-family:Arial; display:flex; background:#f2f5f9; }

/* LOGIN */
#loginPage { width:360px; margin:80px auto; }
.login-box { background:white; border-radius:12px; text-align:center; overflow:hidden; }

.login-header { background:#003580; padding:25px; color:white; }

/* FOOTERS */
.login-footer, .footer {
  font-size:11px;
  padding:15px;
  line-height:1.4;
  text-align:center;
}
.footer {
  position:fixed;
  bottom:0;
  width:100%;
  background:#003580;
  color:white;
}

/* INPUT */
input { width:80%; padding:10px; margin:10px; }

button {
  padding:10px;
  background:#0071c2;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  background:#003580;
  color:white;
  height:100vh;
  padding:20px;
  display:none;
}

/* MAIN */
.main {
  flex:1;
  padding:20px;
  display:none;
}

.cards { display:flex; gap:10px; }
.card { flex:1; background:white; padding:15px; border-radius:10px; text-align:center; }

table { width:100%; background:white; border-collapse:collapse; }
th { background:#003580; color:white; padding:10px; }
td { padding:8px; text-align:center; border-bottom:1px solid #eee; }

.paid { color:green; }
.unpaid { color:red; }

/* MODALS */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
}

.modal-box {
  background:white;
  padding:25px;
  width:350px;
  margin:10% auto;
  text-align:center;
  border-radius:10px;
}

/* RECEIPT */
.success { color:green; font-size:18px; margin-bottom:10px; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<div class="login-box">

<div class="login-header">
<h1>Booking.com</h1>
<div>VAT SYSTEM</div>
</div>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<div class="login-footer">
Do you have questions?<br>Visit Partner Help<br><br>
© Booking.com 2026
</div>

</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<h2>Booking.com</h2>

<select onchange="load(this.value)">
<option value="2026">2026</option>
<option value="2025">2025</option>
</select>
</div>

<!-- MAIN -->
<div class="main" id="main">

<h2>Bellagio Hills Hotel</h2>

<div class="cards">
<div class="card">Total VAT<br><b id="tot"></b></div>
<div class="card">Paid<br><b id="paid"></b></div>
<div class="card">Unpaid<br><b id="unpaid"></b></div>
</div>

<table id="vatTable">
<thead>
<tr>
<th>Month</th><th>VAT</th><th>Status</th><th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<!-- VAT MODAL -->
<div id="modal" class="modal">
<div class="modal-box">
<p id="mMonth"></p>
<p id="mVAT"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<!-- ✅ RECEIPT POPUP -->
<div id="receiptModal" class="modal">
<div class="modal-box">
<div class="success">✅ Payment Successful</div>

<p id="rRef"></p>
<p id="rMonth"></p>
<p id="rDate"></p>
<p id="rAmount"></p>

<button onclick="closeReceipt()">Close</button>
</div>
</div>

<!-- FOOTER -->
<div class="footer">
About | Privacy | FAQs<br>
© Booking.com 2026
</div>

<script>
function peso(n){
return "₱ "+Number(n).toLocaleString("en-PH",{minimumFractionDigits:2});
}

const data2026=[
["January",514,"Paid"],
["February",1108,"Paid"],
["March",287,"Paid"],
["April",90,"Paid"],
["May",1284,"Unpaid"]
];

function login(){
if(user.value==="sales@bellagiohills.com.ph" &&
pass.value==="GMBellagiohills#2025"){
loginPage.style.display="none";
sidebar.style.display="block";
main.style.display="block";
load("2026");
}
}

function load(){
let tb=vatTable.querySelector("tbody");
tb.innerHTML="";

let total=0, paidCount=0, unpaidCount=0;

data2026.forEach(r=>{
total+=r[1];
(r[2]=="Paid")?paidCount++:unpaidCount++;
tb.innerHTML+=rowHTML(r);
});

tot.innerText=peso(total);
paid.innerText=paidCount;
unpaid.innerText=unpaidCount;
}

function rowHTML(r){
return `<tr>
<td>${r[0]}</td>
<td>${peso(r[1])}</td>
<td class="${r[2]=='Paid'?'paid':'unpaid'}">${r[2]}</td>
<td>
${r[2]=='Paid'
? `<button onclick="openModal(this)">View</button>`
: `<button onclick="payVAT(this)">Pay</button>`}
</td>
</tr>`;
}

function payVAT(btn){
let row = btn.parentElement.parentElement;
btn.innerText="Processing...";
btn.disabled=true;

// ✅ 45 seconds
setTimeout(()=>{

row.children[2].innerText="Paid";
row.children[2].className="paid";

btn.outerHTML=`<button onclick="openModal(this)">View</button>`;

paid.innerText++;
unpaid.innerText--;

// ✅ SHOW RECEIPT
showReceipt(row);

},45000);
}

function showReceipt(row){
let ref = "REF"+Math.floor(Math.random()*999999999);

rRef.innerText = "Reference: " + ref;
rMonth.innerText = "Month: " + row.children[0].innerText;
rDate.innerText = "Date: " + new Date().toLocaleDateString();
rAmount.innerText = "Amount: " + row.children[1].innerText;

receiptModal.style.display="block";
}

function closeReceipt(){
receiptModal.style.display="none";
}

function openModal(btn){
let r=btn.parentElement.parentElement;
mMonth.innerText="Month: "+r.children[0].innerText;
mVAT.innerText="VAT: "+r.children[1].innerText;
modal.style.display="block";
}

function closeModal(){
modal.style.display="none";
}
</script>

</body>
</html>
